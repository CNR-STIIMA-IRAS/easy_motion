name: docs

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-22.04

    container:
      image: rostooling/setup-ros-docker:ubuntu-jammy-ros-humble-desktop-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python dependencies
        run: |
          python3 -m pip install -r easy_motion/requirements.txt

      - name: Build and test
        id: action_ros_ci
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: easy_motion_msgs easy_motion easy_motion_behavior_tree easy_motion_cpp
          target-ros2-distro: humble
          colcon-defaults: |
            {
              "test": {
                "parallel-workers": 1
              }
            }
          vcs-repo-file-url: https://raw.githubusercontent.com/CNR-STIIMA-IRAS/easy_motion/refs/heads/main/dependencies.repos

      - name: Install documentation tools
        run: |
          apt-get update
          apt-get install -y \
            python3-rosdoc2 \
            doxygen \
            graphviz

      - name: Build documentation
        run: |
          source /opt/ros/humble/setup.bash
          source "${{ steps.action_ros_ci.outputs.ros-workspace-directory-name }}/install/setup.bash"
          bash .github/scripts/build_docs.sh

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy-docs:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4